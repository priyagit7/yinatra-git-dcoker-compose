# ============================================================
# nginx.conf
# Custom nginx server block for the yinatra-docker-compose app
#
# What this file does:
#   - Serves your app on port 80
#   - Adds a /health endpoint (used by Docker healthcheck &
#     AWS load balancer target group health checks)
#   - Enables gzip compression (faster page loads)
#   - Sets proper cache headers for static assets
# ============================================================

server {
    listen 80;
    server_name _;          # Accept any hostname / IP

    root /usr/share/nginx/html;
    index index.html;

    # ── Health check endpoint ─────────────────────────────
    # AWS ALB and Docker healthcheck will hit this URL.
    # Returns 200 OK with "healthy" text — no file needed.
    location /health {
        access_log off;     # Don't pollute logs with health pings
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Main app ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # try_files: serve the exact file, or fall back to index.html
        # This is needed if you ever add client-side routing (React etc.)
    }

    # ── Gzip compression ──────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 256;

    # ── Cache static assets ───────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================================
# .github/workflows/deploy.yml
# Deploy Type : EC2 Instance
# App Type    : Docker Compose
#
# ── WHAT THIS WORKFLOW DOES (step by step) ──────────────────
#
#  TRIGGER: Every push to 'main' branch OR manual trigger
#            from GitHub → Actions → "Run workflow"
#
#  STEP 1 – Checkout
#    Downloads your repo code onto the GitHub Actions runner
#    (a temporary Ubuntu VM that GitHub spins up for you)
#
#  STEP 2 – Configure AWS Credentials (OIDC)
#    GitHub proves its identity to AWS using OIDC federation.
#    No AWS secret keys are stored anywhere — GitHub gets a
#    short-lived token by talking to AWS's OIDC endpoint.
#    This is why your role has a Trust Relationship pointing
#    to token.actions.githubusercontent.com
#
#  STEP 3 – Build Docker Image
#    Runs `docker build` on the runner to create the image
#    from your Dockerfile
#
#  STEP 4 – Save image as .tar.gz
#    Packages the Docker image into a compressed file so it
#    can be transferred to your EC2 instance
#
#  STEP 5 – Upload artifact to S3
#    Pushes the .tar.gz to your S3 bucket (two copies):
#      • One with the exact git commit SHA (permanent record)
#      • One named 'latest.tar.gz' (always the newest build)
#
#  STEP 6 – Deploy on EC2 via SSM Run Command
#    AWS SSM sends a shell script to your EC2 instance.
#    Your EC2 instance (using EC2SSMRole-yinatra) receives
#    this command and runs it:
#      a. Downloads latest.tar.gz from S3
#      b. Loads the Docker image
#      c. Goes to /opt/apps/yinatra-docker-compose
#      d. Writes a fresh .env file
#      e. Runs `docker compose up -d --build`
#         (--build rebuilds, -d = detached/background mode)
#
#  STEP 7 – Wait for command to finish
#    Polls SSM until the command completes. Fails the
#    workflow if the EC2-side script errors out.
# ============================================================

name: Deploy to EC2 (Docker Compose)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase: build (default) or deploy-only'
        required: false
        default: 'build'
        type: string
      pipeline_run_id:
        description: 'Yinatra pipeline run ID (passed by Yinatra)'
        required: false
        default: ''
        type: string
      image_tag:
        description: 'Image tag override (optional)'
        required: false
        default: ''
        type: string

# Prevent two deploys running at the same time on main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write    # Required for OIDC — GitHub must be able to request a JWT
  contents: read     # Required to checkout the repo code

# ── Global environment variables ─────────────────────────────
# Change these to match your actual AWS setup
env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: "942049393866"
  S3_BUCKET: abaxys-deployss
  S3_PREFIX: artifacts/yinatra-docker-compose
  IMAGE_NAME: yinatra-docker-compose
  DEPLOY_PATH: /opt/apps/yinatra-docker-compose
  # EC2 Instance ID — replace with your actual instance ID
  EC2_INSTANCE_ID: "i-04d74b5b869290833"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ──────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Configure AWS credentials via OIDC ────
      # No AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY needed!
      # GitHub's OIDC token is exchanged for temporary AWS creds.
      # The role 'github-actions-deployer' must have a Trust
      # Relationship that allows token.actions.githubusercontent.com
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deployer
          aws-region: ${{ env.AWS_REGION }}

      # ── Step 3: Set image tag ──────────────────────────
      - name: Set image tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA:0:7}"
          fi
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "Using image tag: $TAG"

      # ── Step 4: Build Docker image ────────────────────
      - name: Build Docker image
        if: ${{ inputs.phase != 'deploy-only' }}
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
          echo "Built image: $IMAGE_NAME:$IMAGE_TAG"

      # ── Step 5: Save and upload image to S3 ──────────
      - name: Save Docker image as tar.gz
        if: ${{ inputs.phase != 'deploy-only' }}
        run: |
          mkdir -p /tmp/artifact
          docker save $IMAGE_NAME:latest | gzip > /tmp/artifact/$IMAGE_NAME.tar.gz
          echo "Image saved to /tmp/artifact/$IMAGE_NAME.tar.gz"

      - name: Upload artifact to S3
        if: ${{ inputs.phase != 'deploy-only' }}
        run: |
          # Upload with commit SHA (permanent record of this exact build)
          aws s3 cp /tmp/artifact/$IMAGE_NAME.tar.gz \
            s3://$S3_BUCKET/$S3_PREFIX/$IMAGE_TAG.tar.gz

          # Upload as 'latest' (EC2 always pulls this one)
          aws s3 cp /tmp/artifact/$IMAGE_NAME.tar.gz \
            s3://$S3_BUCKET/$S3_PREFIX/latest.tar.gz

          echo "✅ Uploaded to S3: s3://$S3_BUCKET/$S3_PREFIX/latest.tar.gz"

      # ── Step 6: Deploy on EC2 via SSM Run Command ────
      # SSM sends this shell script to your EC2 instance.
      # EC2's role (EC2SSMRole-yinatra) must have
      # AmazonSSMManagedInstanceCore to receive SSM commands.
      # github-actions-deployer must have ssm:SendCommand permission.
      - name: Deploy via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Yinatra deploy $IMAGE_TAG" \
            --parameters 'commands=[
              "set -e",
              "echo \"=== Starting deployment ===\"",

              "echo \"--- Pulling latest image from S3 ---\"",
              "aws s3 cp s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/latest.tar.gz /tmp/${{ env.IMAGE_NAME }}.tar.gz",

              "echo \"--- Loading Docker image ---\"",
              "docker load < /tmp/${{ env.IMAGE_NAME }}.tar.gz",

              "echo \"--- Setting up deployment directory ---\"",
              "mkdir -p ${{ env.DEPLOY_PATH }}",
              "chown -R ssm-user:ssm-user ${{ env.DEPLOY_PATH }}",

              "echo \"--- Copying docker-compose.yml from repo ---\"",
              "cd ${{ env.DEPLOY_PATH }}",

              "echo \"--- Writing environment file ---\"",
              "echo APP_ENV=production > ${{ env.DEPLOY_PATH }}/.env",
              "echo APP_PORT=80 >> ${{ env.DEPLOY_PATH }}/.env",

              "echo \"--- Running docker compose up ---\"",
              "docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.yml up -d --remove-orphans",

              "echo \"--- Cleaning up old images ---\"",
              "docker image prune -f",

              "echo \"=== Deployment complete ===\""
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM_COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV
          echo "Sent SSM command: $COMMAND_ID"

      # ── Step 7: Wait for SSM command to finish ────────
      - name: Wait for SSM command to complete
        run: |
          echo "Waiting for command $SSM_COMMAND_ID to finish on $EC2_INSTANCE_ID..."

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$SSM_COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i/30 — Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment succeeded!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              # Print the error output from EC2
              aws ssm get-command-invocation \
                --command-id "$SSM_COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi

            sleep 10
          done

          echo "❌ Timed out waiting for SSM command"
          exit 1
